<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета разработчика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .form-container {
            max-width: 980px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }
        
        .form-header {
            background: linear-gradient(135deg, #1a2a3f, #0f1a2a);
            padding: 1.8rem 2.5rem;
            color: white;
        }
        
        .form-header h1 {
            font-weight: 600;
            font-size: 1.9rem;
            margin-bottom: 0.3rem;
        }
        
        .form-header p {
            font-size: 0.95rem;
            opacity: 0.85;
        }
        
        .form-body {
            padding: 2rem 2.5rem;
        }
        
        .field-group {
            margin-bottom: 1.7rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0.75rem;
        }
        
        .field-group label {
            width: 180px;
            font-weight: 600;
            color: #1f2e45;
            font-size: 0.95rem;
            padding-top: 0.6rem;
            flex-shrink: 0;
        }
        
        .field-group .input-wrapper {
            flex: 1;
            min-width: 220px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        
        .radio-group {
            display: flex;
            gap: 1.8rem;
            align-items: center;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            border: 1.5px solid #e2edf7;
        }
        
        .radio-group label {
            width: auto;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            cursor: pointer;
            padding-top: 0;
        }
        
        .radio-group input {
            width: 18px;
            height: 18px;
            accent-color: #3b82f6;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f8fafd;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            border: 1px solid #e2edf7;
        }
        
        .checkbox-wrapper input {
            width: 20px;
            height: 20px;
            accent-color: #2563eb;
        }
        
        .checkbox-wrapper label {
            font-weight: 500;
            cursor: pointer;
        }
        
        select[multiple] {
            min-height: 140px;
            background: white;
        }
        
        select[multiple] option {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid #ecf3f9;
        }
        
        select[multiple] option:checked {
            background: #3b82f6 linear-gradient(0deg, #3b82f6 0%, #3b82f6 100%);
            color: white;
        }
        
        textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.5;
        }
        
        .action-buttons {
            margin-top: 2rem;
            text-align: right;
            border-top: 1px solid #e9eef3;
            padding-top: 1.8rem;
        }
        
        .save-btn {
            background: linear-gradient(95deg, #1e3a5f, #0f2b44);
            border: none;
            padding: 0.9rem 2.2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.3);
        }
        
        .alert {
            padding: 1rem 1.2rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 720px) {
            .form-body {
                padding: 1.5rem;
            }
            .field-group {
                flex-direction: column;
            }
            .field-group label {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1>📄 Регистрационная анкета</h1>
        <p>Заполните данные о себе — все поля проверяются на сервере</p>
    </div>
    
    <div class="form-body">
        <form method="POST" action="index.php">
            <!-- ФИО -->
            <div class="field-group">
                <label for="fullname">👤 ФИО *</label>
                <div class="input-wrapper">
                    <input type="text" id="fullname" name="fullname" required>
                </div>
            </div>
            
            <!-- Телефон -->
            <div class="field-group">
                <label for="phone">📞 Телефон</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" name="phone">
                </div>
            </div>
            
            <!-- Email -->
            <div class="field-group">
                <label for="email">✉️ E-mail *</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" required>
                </div>
            </div>
            
            <!-- Дата рождения -->
            <div class="field-group">
                <label for="birthdate">🎂 Дата рождения</label>
                <div class="input-wrapper">
                    <input type="date" id="birthdate" name="birthdate">
                </div>
            </div>
            
            <!-- Пол -->
            <div class="field-group">
                <label>⚥ Пол</label>
                <div class="input-wrapper radio-group">
                    <label><input type="radio" name="gender" value="male"> Мужской</label>
                    <label><input type="radio" name="gender" value="female"> Женский</label>
                    <label><input type="radio" name="gender" value="other"> Другой</label>
                    <label><input type="radio" name="gender" value="unspecified" checked> Не указан</label>
                </div>
            </div>
            
            <!-- Языки программирования -->
            <div class="field-group">
                <label>💻 Любимые языки *</label>
                <div class="input-wrapper">
                    <select name="fav_langs[]" id="fav_langs" multiple size="6" required>
                        <option value="Pascal">Pascal</option>
                        <option value="C">C</option>
                        <option value="C++">C++</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="PHP">PHP</option>
                        <option value="Python">Python</option>
                        <option value="Java">Java</option>
                        <option value="Haskell">Haskell</option>
                        <option value="Clojure">Clojure</option>
                        <option value="Prolog">Prolog</option>
                        <option value="Scala">Scala</option>
                        <option value="Go">Go</option>
                    </select>
                    <div style="font-size:0.7rem; color:#5b6e8c; margin-top:0.3rem;">
                        Удерживайте Ctrl (Cmd) для выбора нескольких языков
                    </div>
                </div>
            </div>
            
            <!-- Биография -->
            <div class="field-group">
                <label for="bio">📝 Биография</label>
                <div class="input-wrapper">
                    <textarea id="bio" name="bio" rows="4"></textarea>
                </div>
            </div>
            
            <!-- Контракт -->
            <div class="field-group">
                <label>📑 Согласие</label>
                <div class="input-wrapper checkbox-wrapper">
                    <input type="checkbox" id="contractCheck" name="contract_agreed" required>
                    <label for="contractCheck">Я ознакомлен(а) с условиями пользовательского соглашения *</label>
                </div>
            </div>
            
            <!-- Кнопка сохранения -->
            <div class="action-buttons">
                <button type="submit" class="save-btn">💾 Сохранить</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
